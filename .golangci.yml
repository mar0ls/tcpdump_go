version: 2
run:
  timeout: 3m
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - revive
    - unconvert
    - gocritic
    - gosec
    - nolintlint
formatters:
  enable:
    - gofumpt
    - goimports
issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: "^generated_.*\\.go$"
      linters:
        - all
linters-settings:
  revive:
    severity: warning
  gocritic:
    enabled-checks:
      - appendAssign
      - boolExprSimplify